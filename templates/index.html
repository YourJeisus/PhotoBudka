<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBudka</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- LIVE CAMERA BACKGROUND (always visible) -->
    <div id="camera-bg">
        <img id="camera-feed" src="/video_feed" alt="Camera">
    </div>

    <!-- WELCOME SCREEN (overlay on top of camera) -->
    <div id="screen-welcome" class="screen active">
        <div class="welcome-overlay">
            <h1 class="title">FOTOBUDKA</h1>
            <button class="btn btn-primary btn-huge" onclick="startCapture()">
                <span class="btn-icon">📸</span>
                <span>FOTO</span>
            </button>
        </div>
    </div>

    <!-- COUNTDOWN SCREEN (camera visible behind) -->
    <div id="screen-countdown" class="screen">
        <div id="countdown" class="countdown"></div>
    </div>

    <!-- FLASH OVERLAY -->
    <div id="flash" class="flash"></div>

    <!-- RESULT SCREEN -->
    <div id="screen-result" class="screen">
        <div class="result-content">
            <div class="photo-frame">
                <img id="captured-photo" src="" alt="Your photo">
            </div>
            <div class="result-buttons">
                <button class="btn btn-primary btn-large" onclick="printPhoto()">
                    <span class="btn-icon">🖨️</span>
                    <span>PRINT</span>
                </button>
                <button class="btn btn-secondary btn-large" onclick="retake()">
                    <span class="btn-icon">↩️</span>
                    <span>RETAKE</span>
                </button>
            </div>
        </div>
    </div>

    <!-- PRINTING SCREEN -->
    <div id="screen-printing" class="screen">
        <div class="printing-content">
            <div class="spinner"></div>
            <h2>Printing...</h2>
        </div>
    </div>

    <!-- DONE SCREEN -->
    <div id="screen-done" class="screen">
        <div class="done-content">
            <h2>Done!</h2>
            <button class="btn btn-primary btn-huge" onclick="reset()">
                <span class="btn-icon">📸</span>
                <span>ONE MORE</span>
            </button>
        </div>
    </div>

    <!-- ERROR SCREEN -->
    <div id="screen-error" class="screen">
        <div class="error-content">
            <h2>Error</h2>
            <p id="error-message"></p>
            <button class="btn btn-secondary btn-large" onclick="reset()">
                <span>BACK</span>
            </button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
