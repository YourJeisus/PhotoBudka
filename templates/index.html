<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBudka</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- WELCOME SCREEN -->
    <div id="screen-welcome" class="screen active">
        <div class="welcome-content">
            <h1 class="title">ФОТОБУДКА</h1>
            <p class="subtitle">Нажми чтобы сфотографироваться!</p>
            <button class="btn btn-primary btn-huge" onclick="startCapture()">
                <span class="btn-icon">📸</span>
                <span>СДЕЛАТЬ ФОТО</span>
            </button>
        </div>
    </div>

    <!-- PREVIEW + COUNTDOWN SCREEN -->
    <div id="screen-preview" class="screen">
        <div class="preview-container">
            <img id="camera-feed" src="/video_feed" alt="Camera">
            <div id="countdown" class="countdown hidden"></div>
        </div>
    </div>

    <!-- FLASH OVERLAY -->
    <div id="flash" class="flash"></div>

    <!-- RESULT SCREEN -->
    <div id="screen-result" class="screen">
        <div class="result-content">
            <h2>Отличное фото!</h2>
            <div class="photo-frame">
                <img id="captured-photo" src="" alt="Your photo">
            </div>
            <div class="result-buttons">
                <button class="btn btn-primary btn-large" onclick="printPhoto()">
                    <span class="btn-icon">🖨️</span>
                    <span>ПЕЧАТЬ</span>
                </button>
                <button class="btn btn-secondary btn-large" onclick="retake()">
                    <span class="btn-icon">↩️</span>
                    <span>ПЕРЕСНЯТЬ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- PRINTING SCREEN -->
    <div id="screen-printing" class="screen">
        <div class="printing-content">
            <div class="spinner"></div>
            <h2>Печатаем...</h2>
            <p>Подождите, идёт печать</p>
        </div>
    </div>

    <!-- DONE SCREEN -->
    <div id="screen-done" class="screen">
        <div class="done-content">
            <h2>Готово!</h2>
            <p>Забери свой чек!</p>
            <button class="btn btn-primary btn-huge" onclick="reset()">
                <span class="btn-icon">📸</span>
                <span>ЕЩЁ РАЗ</span>
            </button>
        </div>
    </div>

    <!-- ERROR SCREEN -->
    <div id="screen-error" class="screen">
        <div class="error-content">
            <h2>Ошибка</h2>
            <p id="error-message"></p>
            <button class="btn btn-secondary btn-large" onclick="reset()">
                <span>НАЗАД</span>
            </button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
